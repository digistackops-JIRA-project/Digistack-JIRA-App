# flyway.conf — Flyway configuration for AdminDB
# Override each value via environment variable (FLYWAY_URL, FLYWAY_USER, etc.)

flyway.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:admindb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
flyway.user=${DB_USER:adminuser}
flyway.password=${DB_PASSWORD:adminpass}

flyway.locations=filesystem:./migrations
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.table=flyway_schema_history

# Encoding
flyway.encoding=UTF-8
flyway.placeholderReplacement=false
