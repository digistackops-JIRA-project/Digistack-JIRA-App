# ============================================================================
# Frontend — Kubernetes Manifests
# Apply: kubectl apply -f k8s/frontend/
# ============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: sapsecops
  labels:
    app: admin-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
      - name: admin-frontend
        image: registry.sapsecops.in/sapsecops/admin-frontend:IMAGE_TAG
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
  namespace: sapsecops
spec:
  selector:
    app: admin-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP

---
# Ingress — requires nginx ingress controller installed
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-portal-ingress
  namespace: sapsecops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - admin.sapsecops.in
    secretName: admin-tls
  rules:
  - host: admin.sapsecops.in
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: admin-backend
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: admin-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-frontend
            port:
              number: 80
