# ============================================================================
# Flyway Migration Job — Kubernetes
# Run BEFORE deploying backend. Trigger manually per release.
# kubectl apply -f k8s/database/flyway-job.yaml
# kubectl wait --for=condition=complete job/flyway-migrate -n sapsecops --timeout=120s
# ============================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: sapsecops
type: Opaque
data:
  DB_HOST:     <base64-encoded-db-host>
  DB_USER:     <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flyway-migrations
  namespace: sapsecops
# Note: For production use, mount migrations via an init container or
# a pre-built Flyway image containing the SQL files.
# See: FROM flyway/flyway:10; COPY migrations/ /flyway/sql/

---
apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migrate
  namespace: sapsecops
  labels:
    app: flyway-migrate
    tier: database
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: flyway
        # Use a custom image that bakes in migration scripts:
        # FROM flyway/flyway:10
        # COPY migrations/ /flyway/sql/
        image: registry.sapsecops.in/sapsecops/admin-flyway:IMAGE_TAG
        args:
          - migrate
        env:
        - name: FLYWAY_URL
          value: "jdbc:mysql://$(DB_HOST):3306/admindb?useSSL=true&requireSSL=true"
        - name: FLYWAY_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_USER
        - name: FLYWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_PASSWORD
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_HOST
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  backoffLimit: 2
