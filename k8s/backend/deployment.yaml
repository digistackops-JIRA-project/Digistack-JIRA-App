# ============================================================================
# Backend — Kubernetes Manifests
# Apply: kubectl apply -f k8s/backend/
# ============================================================================

---
# Secret — populate with base64 values before applying
# Generate: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: admin-backend-secrets
  namespace: sapsecops
type: Opaque
data:
  DB_HOST:     <base64-encoded-db-host>
  DB_PORT:     MzMwNg==          # 3306
  DB_USER:     <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>
  DB_NAME:     YWRtaW5kYg==      # admindb
  SECRET_KEY:  <base64-encoded-256bit-secret>
  APP_ENV:     cHJvZHVjdGlvbg==  # production
  CORS_ORIGINS: <base64-encoded-cors-origins>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-backend
  namespace: sapsecops
  labels:
    app: admin-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: admin-backend
    spec:
      containers:
      - name: admin-backend
        image: registry.sapsecops.in/sapsecops/admin-backend:IMAGE_TAG
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: admin-backend-secrets
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: admin-backend
  namespace: sapsecops
spec:
  selector:
    app: admin-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-backend-hpa
  namespace: sapsecops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
