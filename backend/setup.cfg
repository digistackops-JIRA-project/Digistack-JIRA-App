[flake8]
max-line-length = 120
exclude =
    .venv,
    venv,
    __pycache__,
    .git,
    build,
    dist
ignore =
    # line too long (handled by max-line-length)
    E501,
    # line break before binary operator
    W503,
    # whitespace before ':'
    E203

per-file-ignores =
    # allow unused imports in __init__.py files
    __init__.py: F401

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = app
omit =
    app/__init__.py
    app/routers/__init__.py

[coverage:report]
show_missing = true
skip_covered = false
fail_under = 70
